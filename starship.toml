format = """\
[╭╴](fg:arrow)\
$username\
$directory\
$time\
(\
    $git_branch\
    $git_status\
)\
$cmd_duration
[╰─](fg:arrow)$character\
"""

add_newline = true

palette = "gruvbox"

[palettes.gruvbox]
arrow = "#928374"
os = "#b8bb26"
os_admin = "#fb4934"
directory = "#3c3836"
time = "#665c54"
node = "#fabd2f"
git = "#83a598"
git_status = "#8ec07c"
python = "#fabd2f"
rust = "#fe8019"
duration = "#d3869b"
text_color = "#ebdbb2"
text_light = "#282828"

[username]
style_user = 'os'
style_root = 'os_admin'
format = '[]($style)[  Hiram](bg:$style fg:text_color)[]($style)'
disabled = false
show_always = true

[character]
success_symbol = "[󰍟](fg:arrow)"
error_symbol = "[󰍟](fg:red)"

[directory]
format = " [](fg:directory)[  $path ]($style)[$read_only]($read_only_style)[](fg:directory)"
truncation_length = 3
style = "fg:text_color bg:directory"
read_only_style = "fg:text_color bg:directory"
before_repo_root_style = "fg:text_color bg:directory"
truncation_symbol = "…/"
truncate_to_repo = true
read_only ="  "

[directory.substitutions]
"Escritorio" = "  "
"Documentos" = "  "
"Descargas" = "  "
"Música" = " 󰎈"
"Imágenes" = "  "
"Vídeos" = "  "
"Proyectos" = " 󰊤 "

[time]
disabled = false
format = " [](fg:time)[ $time]($style)[](fg:time)"
time_format = "%H:%M"
style = "fg:text_color bg:time"

[cmd_duration]
format = " [](fg:duration)[ $duration]($style)[](fg:duration)"
style = "fg:text_light bg:duration"
min_time = 500

[git_branch]
format = " [](fg:git)[$symbol$branch](fg:text_light bg:git)[](fg:git)"
symbol = " "

[git_status]
format = '([ ](fg:git_status)[ $all_status$ahead_behind ]($style)[](fg:git_status))'
style = "fg:text_light bg:git_status"

[package]
disabled = true

