format = """\
[в•ӯв•ҙ](fg:arrow)\
$username\
$directory\
$time\
(\
    $git_branch\
    $git_status\
)\
$cmd_duration
[в•°в”Җ](fg:arrow)$character\
"""
# Add the modules you need

# Disables the blank line at the start of the prompt
add_newline = true

palette = "normal"

[palettes.normal]
arrow = "#7f849c"
os = "#11111b"
os_admin = "#f38ba8"
directory = "#313244"
time = "#45475a"
node = "#F1DEA9"
git = "#89b4fa"
git_status = "#8aadf4"
python = "#F5CB5C"
conda = "#3EB049"
rust = "#C33C00"
clang = "#00599D"
duration = "#b4befe"
text_color = "#cdd6f4"
text_light = "#313244"

[username]
style_user = 'os'
style_root = 'os_admin'
format = '[оӮ¶]($style)[пҢғ  Hiram](bg:$style fg:text_color)[оӮҙ]($style)'
disabled = false
show_always = true

[character]
success_symbol = "[у°Қҹ](fg:arrow)"
error_symbol = "[у°Қҹ](fg:red)"

[directory]
format = " [оӮ¶](fg:directory)[пҒј  $path ]($style)[$read_only]($read_only_style)[оӮҙ](fg:directory)"
truncation_length = 3
style = "fg:text_color bg:directory"
read_only_style = "fg:text_color bg:directory"
before_repo_root_style = "fg:text_color bg:directory"
truncation_symbol = "вҖҰ/"
truncate_to_repo = true
read_only =" о©ө "

[directory.substitutions]
"Escritorio" = " п’© "
"Documentos" = " п’Ҙ "
"Descargas" = " пҗү "
"MГәsica" = " у°ҺҲ"
"ImГЎgenes" = " пҗҸ "
"VГӯdeos" = " п”¬ "
"Proyectos" = " у°ҠӨ "

[time]
disabled = false
format = " [оӮ¶](fg:time)[пҖ— $time]($style)[оӮҙ](fg:time)"
time_format = "%H:%M"
style = "fg:text_color bg:time"

[cmd_duration]
format = " [оӮ¶](fg:duration)[пү” $duration]($style)[оӮҙ](fg:duration)"
style = "fg:text_light bg:duration"
min_time = 500

[git_branch]
format = " [оӮ¶](fg:git)[$symbol$branch](fg:text_light bg:git)[оӮҙ](fg:git)"
symbol = "пҗҳ "

[git_status]
format = '([ оӮ¶](fg:git_status)[ $all_status$ahead_behind ]($style)[оӮҙ](fg:git_status))'
style = "fg:text_light bg:git_status"

